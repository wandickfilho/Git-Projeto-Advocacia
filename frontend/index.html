<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Controle de Processos - Advocacia</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="container">
    <header class="page-header card">
      <h1>Controle de Processos</h1>
      <p>Cadastro, filtro e listagem de processos jurídicos</p>
    </header>

    <section class="card">
      <h2>Cadastro / Edição de Processo</h2>
      <form id="processoForm" class="form-grid">
        <div class="campo">
          <label for="numeroProcesso">Número do processo</label>
          <input type="text" id="numeroProcesso" name="numeroProcesso" />
        </div>

        <div class="campo">
          <label for="nomeCliente">Nome do cliente</label>
          <input type="text" id="nomeCliente" name="nomeCliente" />
        </div>

        <div class="campo">
          <label for="cpfCliente">CPF</label>
          <input type="text" id="cpfCliente" name="cpfCliente" placeholder="000.000.000-00" />
        </div>

        <div class="campo">
          <label for="tipoAcao">Tipo de ação</label>
          <input type="text" id="tipoAcao" name="tipoAcao" />
        </div>

        <div class="campo">
          <label for="statusProcesso">Status</label>
          <select id="statusProcesso" name="statusProcesso">
            <option value="pendente">Pendente</option>
            <option value="em_andamento">Em andamento</option>
            <option value="concluido">Concluído</option>
            <option value="arquivado">Arquivado</option>
          </select>
        </div>

        <div class="campo">
          <label for="dataProtocolo">Data de protocolo</label>
          <input type="date" id="dataProtocolo" name="dataProtocolo" />
        </div>

        <div class="campo campo-full">
          <label for="descricao">Descrição</label>
          <textarea id="descricao" name="descricao" rows="4"></textarea>
        </div>

        <div class="campo campo-full">
          <label for="fotoCliente">Foto do cliente</label>
          <input type="file" id="fotoCliente" name="fotoCliente" accept=".jpg,.jpeg,.png" />
        </div>

        <div class="acoes-form campo-full">
          <button type="submit" id="btnSalvar">Salvar</button>
        </div>
      </form>
    </section>

    <section class="card">
      <h2>Filtros</h2>
      <div class="filtros-grid">
        <div class="campo">
          <label for="filtroBusca">Busca (nome, CPF ou nº processo)</label>
          <input type="text" id="filtroBusca" name="filtroBusca" />
        </div>

        <div class="campo">
          <label for="filtroStatus">Status</label>
          <select id="filtroStatus" name="filtroStatus">
            <option value="">Todos</option>
            <option value="pendente">Pendente</option>
            <option value="em_andamento">Em andamento</option>
            <option value="concluido">Concluído</option>
            <option value="arquivado">Arquivado</option>
          </select>
        </div>

        <div class="acoes-filtro">
          <button type="button" id="btnLimparFiltros">Limpar filtros</button>
        </div>
      </div>
    </section>

    <section class="card">
      <h2>Listagem de Processos</h2>
      <div class="tabela-wrapper">
        <table id="tabelaProcessos">
          <thead>
            <tr>
              <th>Número</th>
              <th>Cliente</th>
              <th>CPF</th>
              <th>Tipo</th>
              <th>Status</th>
              <th>Protocolo</th>
              <th>Ações</th>
            </tr>
          </thead>
          <tbody id="corpoTabela">
            <!-- Linhas serão adicionadas via JavaScript -->
          </tbody>
        </table>
      </div>
    </section>
  </main>

  <div id="toastContainer" aria-live="polite" aria-atomic="true"></div>

  <script src="script.js"></script>
</body>
</html>
