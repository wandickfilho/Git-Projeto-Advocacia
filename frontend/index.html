<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Sistema Jurídico</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- HEADER -->
    <header>
        <h1>Sistema de Processos Jurídicos</h1>
    </header>

    <!-- CONTEÚDO PRINCIPAL -->
    <main>

        <!-- SEÇÃO DE CADASTRO -->
        <section id="cadastro">
            <h2>Cadastrar Processo</h2>

            <div class="form-group">
                <label for="nome">Cliente</label>
                <input type="text" id="nome" placeholder="Nome do cliente">
            </div>

            <div class="form-group">
                <label for="cpf">CPF</label>
                <input type="text" id="cpf" placeholder="CPF">
            </div>

            <div class="form-group">
                <label for="tipo">Tipo de Ação</label>
                <input type="text" id="tipo" placeholder="Ex: Trabalhista">
            </div>

            <button id="btn-cadastrar">Cadastrar</button>
        </section>

        <!-- SEÇÃO DA TABELA -->
        <section id="tabela-processos">
            <h2>Processos</h2>

            <table>
                <thead>
                    <tr>
                        <th>Nº Processo</th>
                        <th>Cliente</th>
                        <th>CPF</th>
                        <th>Tipo</th>
                        <th>Status</th>
                        <th>Data</th>
                    </tr>
                </thead>

                <tbody id="corpo-tabela">
                    <!-- Dados vão ser inseridos aqui via JS -->
                </tbody>
            </table>
        </section>

    </main>

    <script src="script.js"></script>
</body>
</html>
