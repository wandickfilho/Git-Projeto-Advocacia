<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Listagem de Processos</title>
  <link rel="stylesheet" href="../style.css">
</head>

<body>
  <main class="container">

    <header class="page-header card">
      <h1>Listagem de Processos</h1>
      <p>Visualização dos processos cadastrados</p>
    </header>

    <section class="card">
      <h2>Processos</h2>

      <div class="tabela-wrapper">
        <table id="tabelaProcessos">
          <thead>
            <tr>
              <th>Número</th>
              <th>Cliente</th>
              <th>CPF</th>
              <th>Tipo</th>
              <th>Status</th>
              <th>Protocolo</th>
              <th>Ações</th>
            </tr>
          </thead>

          <tbody id="corpoTabela">
            <tr>
              <td colspan="7">Nenhum processo encontrado</td>
            </tr>
          </tbody>
        </table>
      </div>
    </section>
  </main>
  <a href="../index.html" class="button-Return-Listens">
      <img src="../imgs/return_blue_arrow.png" alt="Voltar">
      </a>
<div class="logo-full">
  <img src="../imgs/logotipo1.png" alt="Logo da Empresa">
</div>
</body>
</html>
