<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Listagem de Processos</title>
  <link rel="stylesheet" href="../style.css">
  <link rel="stylesheet" href="./listagens.css">
  <script src="../auth-check.js"></script>
</head>

<body>

<main class="container">

  <header class="page-header card">
  <!-- ✅ Botão voltar -->
  <a href="controle.html" class="btn-voltar">← Voltar</a>
  <h1>Listagem de Processos</h1>
  <p>Visualização dos processos cadastrados</p>

</header>

  <!-- 🔍 FILTROS -->
  <section class="card">
    <h2>Filtros</h2>
    <div class="filtros-grid">
      <input type="text" id="filtroBusca" placeholder="Buscar por número ou cliente">
      <select id="filtroStatus">
        <option value="">Todos</option>
        <option value="em andamento">Em andamento</option>
        <option value="concluído">Concluído</option>
        <option value="arquivado">Arquivado</option>
        <option value="pendente">Pendente</option>
      </select>
      <div class="acoes-filtro">
        <button id="btnFiltrar">Filtrar</button>
        <button id="btnLimparFiltros">Limpar</button>
      </div>
    </div>
  </section>

  <!-- 📋 TABELA -->
  <section class="card">
    <table>
      <thead>
        <tr>
          <th>Número</th>
          <th>Cliente</th>
          <th>CPF</th>
          <th>Tipo</th>
          <th>Status</th>
          <th>Data</th>
          <th>Ações</th>
        </tr>
      </thead>
      <tbody id="corpoTabela"></tbody>
    </table>
  </section>

</main>

<!-- ✏️ MODAL EDITAR -->
<div id="modalEditar">
  <div id="modalEditarContent">

    <h3>Editar Processo</h3>

    <input id="edit_numero" placeholder="Número processo">
    <input id="edit_nome"   placeholder="Nome cliente">
    <input id="edit_cpf"    placeholder="CPF">

    <select id="edit_tipo">
      <option value="Cível">Civil</option>
      <option value="Criminal">Criminal</option>
      <option value="Trabalhista">Trabalhista</option>
    </select>

    <select id="edit_status">
      <option value="Em andamento">Em andamento</option>
      <option value="Concluído">Concluído</option>
      <option value="Arquivado">Arquivado</option>
      <option value="Pendente">Pendente</option>
    </select>

    <input type="date" id="edit_data">

    <!-- ══ ARQUIVOS DO PROCESSO ══ -->
    <div class="arquivos-section is-hidden" id="modalArquivos">

      <div>
        <h4>📷 Fotos</h4>
        <div class="arquivos-grid" id="modalFotosGrid"></div>
        <input type="file" id="edit_fotos" multiple accept="image/*">
      </div>

      <div>
        <h4>📄 Documentos</h4>
        <div class="arquivos-grid" id="modalDocsGrid"></div>
        <input type="file" id="edit_docs" multiple accept=".pdf,.doc,.docx,.xls,.xlsx,.txt"> 
      </div>

    </div>

    <div class="modal-actions">
      <button onclick="salvarEdicao()">Salvar</button>
      <button onclick="fecharModal()">Cancelar</button>
    </div>

  </div>
</div>

<script src="../script.js"></script>
<script>
  // URL base do backend para servir os arquivos
  const BASE_URL = "http://localhost:3000";

  function iconeDoc(nome) {
    const ext = (nome || "").split(".").pop().toLowerCase();
    return { pdf:"📕", doc:"📘", docx:"📘", xls:"📗", xlsx:"📗", txt:"📄" }[ext] || "📄";
  }

  // Chamada após editarProcesso() popular o modal — exibe fotos e docs
  window.renderArquivosModal = function(fotos, documentos) {
    const secao    = document.getElementById("modalArquivos");
    const fotosEl  = document.getElementById("modalFotosGrid");
    const docsEl   = document.getElementById("modalDocsGrid");

    fotosEl.innerHTML = "";
    docsEl.innerHTML  = "";

    // Fotos
    if (fotos && fotos.length) {
      fotos.forEach(nome => {
        const url  = BASE_URL + "/uploads/fotos/" + nome;
        const item = document.createElement("a");
        item.href     = url;
        item.download = nome;
        item.target   = "_blank";
        item.className = "arquivo-foto";
        item.title    = nome;
        item.innerHTML = `<img src="${url}" alt="${nome}">
                          <div class="overlay">⬇️</div>`;
        fotosEl.appendChild(item);
      });
    } else {
      fotosEl.innerHTML = '<span class="sem-arquivos">Nenhuma foto</span>';
    }

    // Documentos
    if (documentos && documentos.length) {
      documentos.forEach(nome => {
        const url  = BASE_URL + "/uploads/documentos/" + nome;
        const item = document.createElement("a");
        item.href      = url;
        item.download  = nome;
        item.target    = "_blank";
        item.className = "arquivo-doc";
        item.innerHTML = `<span class="doc-icon">${iconeDoc(nome)}</span>
                          <span class="doc-name" title="${nome}">${nome}</span>
                          <span>⬇️</span>`;
        docsEl.appendChild(item);
      });
    } else {
      docsEl.innerHTML = '<span class="sem-arquivos">Nenhum documento</span>';
    }

    secao.classList.remove("is-hidden");
  };
</script>

</body>
</html>
