<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Listagem de Processos</title>
  <link rel="stylesheet" href="../style.css">
</head>

<body>

<main class="container">

  <header class="page-header card">
    <h1>Listagem de Processos</h1>
    <p>Visualização dos processos cadastrados</p>
  </header>

  <!-- 🔍 FILTROS -->
  <section class="card">
    <h2>Filtros</h2>

    <input type="text" id="filtroBusca" placeholder="Buscar por número ou cliente">

    <select id="filtroStatus">
      <option value="">Todos</option>
      <option value="em andamento">Em andamento</option>
      <option value="concluído">Concluído</option>
      <option value="arquivado">Arquivado</option>
      <option value="pendente">Pendente</option>
    </select>

    <button id="btnFiltrar">Filtrar</button>
    <button id="btnLimparFiltros">Limpar</button>
  </section>

  <!-- 📋 TABELA -->
  <section class="card">
    <table>
      <thead>
        <tr>
          <th>Número</th>
          <th>Cliente</th>
          <th>CPF</th>
          <th>Tipo</th>
          <th>Status</th>
          <th>Data</th>
          <th>Ações</th>
        </tr>
      </thead>

      <tbody id="corpoTabela"></tbody>
    </table>
  </section>

</main>

<!-- ✏️ MODAL EDITAR -->
<div id="modalEditar">

  <div id="modalEditarContent">

    <h3>Editar Processo</h3>

    <input id="edit_numero" placeholder="Número processo">
    <input id="edit_nome" placeholder="Nome cliente">
    <input id="edit_cpf" placeholder="CPF">

    <select id="edit_tipo">
      <option value="Cível">Civil</option>
      <option value="Criminal">Criminal</option>
      <option value="Trabalhista">Trabalhista</option>
    </select>

    <select id="edit_status">
      <option value="Em andamento">Em andamento</option>
      <option value="Concluído">Concluído</option>
      <option value="Arquivado">Arquivado</option>
      <option value="Pendente">Pendente</option>
    </select>

    <input type="date" id="edit_data">

    <div class="modal-actions">
      <button onclick="salvarEdicao()">Salvar</button>
      <button onclick="fecharModal()">Cancelar</button>
    </div>

  </div>

</div>

<script src="../script.js"></script>

</body>
</html>
