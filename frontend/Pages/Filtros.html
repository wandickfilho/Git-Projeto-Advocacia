<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Filtros</title>
  <link rel="stylesheet" href="../style.css">
</head>

<body>
  <main class="container">

    <header class="page-header card">
      <h1>Filtros</h1>
      <p>Filtrar processos cadastrados</p>
    </header>

    <!-- =========================
         FILTROS
    ========================== -->
    <section class="card">
      <h2>Filtros</h2>

      <div class="form-grid">

        <!-- 🔍 BUSCA -->
        <div class="campo">
          <label>Busca</label>
          <input type="text" id="filtroBusca">
        </div>

        <!-- 📊 STATUS -->
        <div class="campo">
          <label>Status</label>
          <select id="filtroStatus">
            <option value="">Todos</option>
            <option value="Em andamento">Em andamento</option>
            <option value="Concluído">Concluído</option>
            <option value="Arquivado">Arquivado</option>
            <option value="Pendente">Pendente</option>
          </select>
        </div>

        <!-- 🔘 BOTÕES -->
        <div class="acoes-form campo-full">
          <button type="button" id="btnFiltrar">Filtrar</button>
          <button type="button" id="btnLimparFiltros">Limpar</button>
        </div>

      </div>
    </section>

    <!-- =========================
         LISTAGEM DE PROCESSOS
    ========================== -->
    <section class="card">
      <h2>Resultados</h2>
      <div id="lista-processos"></div>
    </section>

    <!-- 🔙 VOLTAR -->
    <a href="controle.html" class="button-Return-Filters">
      <img src="../imgs/return_blue_arrow.png" alt="Voltar">
    </a>

  </main>

  <div class="logo-full">
    <img src="../imgs/logotipo1.png" alt="Logo da Empresa">
  </div>

  <script src="../script.js"></script>
</body>
</html>
