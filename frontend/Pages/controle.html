<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Controle de Processos</title>
  <link rel="stylesheet" href="../style.css" />
  <link rel="stylesheet" href="./controle.css" />
</head>

<body>
<main class="container">

  <header class="page-header card">
    <h1>Controle de Processos</h1>
    <p>Cadastro e listagem de processos jurídicos</p>
  </header>

  <!-- =========================
       CADASTRO DE PROCESSO
  ========================== -->
  <section class="card">
    <h2>Cadastro de Processo</h2>

    <form id="processoForm" class="form-grid">

      <div class="campo">
        <label>Número do processo</label>
        <input type="text" id="numero_processo" required>
      </div>

      <div class="campo">
        <label>Nome do Cliente</label>
        <input type="text" id="nome_cliente" required>
      </div>

      <div class="campo">
        <label>CPF do Cliente</label>
        <input type="text" id="cpf_cliente" required>
      </div>

      <div class="campo">
        <label>Tipo de ação</label>
        <select id="tipo_acao" required>
          <option value="Cível">Civil</option>
          <option value="Criminal">Criminal</option>
          <option value="Trabalhista">Trabalhista</option>
        </select>
      </div>

      <div class="campo">
        <label>Status</label>
        <select id="status_processo" required>
          <option value="Em andamento">Em andamento</option>
          <option value="Concluído">Concluído</option>
          <option value="Arquivado">Arquivado</option>
          <option value="Pendente">Pendente</option>
        </select>
      </div>

      <div class="campo">
        <label>Data de protocolo</label>
        <input type="date" id="data_protocolo" required>
      </div>

      <div class="campo campo-full">
        <label>Descrição</label>
        <textarea id="descricao" rows="4"></textarea>
      </div>

      <!-- ══════════════════════════
           FOTOS
      ══════════════════════════ -->
      <div class="campo campo-full">
        <label>Fotos</label>
        <div class="upload-zone" id="zonaFotos">
          <input type="file" id="inputFotos" accept="image/*" multiple>
          <span class="upload-icon">🖼️</span>
          <p>Clique ou arraste as fotos aqui</p>
          <small>JPG, PNG, WEBP — múltiplas permitidas</small>
        </div>
        <span class="upload-count" id="countFotos"></span>
        <div class="preview-grid" id="previewFotos"></div>
      </div>

      <!-- ══════════════════════════
           DOCUMENTOS
      ══════════════════════════ -->
      <div class="campo campo-full">
        <label>Documentos</label>
        <div class="upload-zone" id="zonaDocumentos">
          <input type="file" id="inputDocumentos" accept=".pdf,.doc,.docx,.xls,.xlsx,.txt" multiple>
          <span class="upload-icon">📄</span>
          <p>Clique ou arraste os documentos aqui</p>
          <small>PDF, DOC, DOCX, XLS, XLSX, TXT — múltiplos permitidos</small>
        </div>
        <span class="upload-count" id="countDocumentos"></span>
        <div class="preview-grid" id="previewDocumentos"></div>
      </div>

      <div class="acoes-form campo-full">
        <button type="submit">Salvar</button>
      </div>

    </form>
  </section>

  <!-- =========================
       BOTÕES (RESTAURADOS)
  ========================== -->
  <div class="links-navegacao">
    <a href="../Pages/Listagens.html" class="button-Listens">Listagens</a>
  </div>

</main>

<script src="../script.js"></script>
<script>
  //////////////////////////////
  // 📁 UPLOAD — fotos e documentos
  //////////////////////////////

  let listaFotos = [];
  let listaDocumentos = [];

  function iconeDoc(nome) {
    const ext = nome.split(".").pop().toLowerCase();
    return { pdf:"📕", doc:"📘", docx:"📘", xls:"📗", xlsx:"📗", txt:"📄" }[ext] || "📄";
  }

  function renderFotos() {
    const grid  = document.getElementById("previewFotos");
    const count = document.getElementById("countFotos");
    grid.innerHTML = "";
    count.textContent = listaFotos.length ? listaFotos.length + " foto(s) selecionada(s)" : "";
    listaFotos.forEach(function(file, i) {
      const url  = URL.createObjectURL(file);
      const item = document.createElement("div");
      item.className = "preview-item foto";
      item.innerHTML = '<img src="' + url + '" title="' + file.name + '">'
                     + '<button type="button" class="btn-remover" onclick="removerFoto(' + i + ')">✕</button>';
      grid.appendChild(item);
    });
  }

  function renderDocumentos() {
    const grid  = document.getElementById("previewDocumentos");
    const count = document.getElementById("countDocumentos");
    grid.innerHTML = "";
    count.textContent = listaDocumentos.length ? listaDocumentos.length + " documento(s) selecionado(s)" : "";
    listaDocumentos.forEach(function(file, i) {
      const item = document.createElement("div");
      item.className = "preview-item doc";
      item.innerHTML = '<span class="doc-icon">' + iconeDoc(file.name) + '</span>'
                     + '<span class="doc-name" title="' + file.name + '">' + file.name + '</span>'
                     + '<button type="button" class="btn-remover" onclick="removerDoc(' + i + ')">✕</button>';
      grid.appendChild(item);
    });
  }

  function removerFoto(i)  { listaFotos.splice(i, 1);      renderFotos(); }
  function removerDoc(i)   { listaDocumentos.splice(i, 1); renderDocumentos(); }

  document.getElementById("inputFotos").addEventListener("change", function(e) {
    listaFotos.push.apply(listaFotos, Array.from(e.target.files));
    e.target.value = "";
    renderFotos();
  });

  document.getElementById("inputDocumentos").addEventListener("change", function(e) {
    listaDocumentos.push.apply(listaDocumentos, Array.from(e.target.files));
    e.target.value = "";
    renderDocumentos();
  });

  // Drag & drop
  ["zonaFotos", "zonaDocumentos"].forEach(function(id) {
    const zona = document.getElementById(id);
    zona.addEventListener("dragover",  function(e) { e.preventDefault(); zona.classList.add("dragover"); });
    zona.addEventListener("dragleave", function()  { zona.classList.remove("dragover"); });
    zona.addEventListener("drop", function(e) {
      e.preventDefault();
      zona.classList.remove("dragover");
      const arquivos = Array.from(e.dataTransfer.files);
      if (id === "zonaFotos") {
        listaFotos.push.apply(listaFotos, arquivos.filter(function(f){ return f.type.startsWith("image/"); }));
        renderFotos();
      } else {
        listaDocumentos.push.apply(listaDocumentos, arquivos);
        renderDocumentos();
      }
    });
  });

  // Expõe para o script.js usar no submit
  window.getArquivosSelecionados = function() {
    return { fotos: listaFotos, documentos: listaDocumentos };
  };
</script>
</body>
</html>
