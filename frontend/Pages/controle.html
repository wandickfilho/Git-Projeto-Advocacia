<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Controle de Processos - Advocacia</title>
  <link rel="stylesheet" href="../style.css" />
</head>
<body>
  <main class="container">
    <header class="page-header card">
      <h1>Controle de Processos</h1>
      <p>Cadastro, filtro e listagem de processos jurídicos</p>
    </header>

    <section class="card">
      <h2>Cadastro</h2>
      <form id="processoForm" class="form-grid">
        <div class="campo">
          <label for="numeroProcesso">Número do processo</label>
          <input type="text" id="processo" name="processo" maxlength="25" placeholder="0000000-00.0000.0.00.0000" required>
        </div>

        <div class="campo">
          <label for="nomeCliente">Nome do cliente</label>
          <input type="text" id="nomeCliente" name="nomeCliente" required/>
        </div>
        <div class="campo">
          <label for="senhaGov">Senha Gov</label>
          <input type="text" id="nomeCliente" name="govCliente" required/>
        </div>
        <div class="campo">
          <label for="cpfCliente">CPF</label>
          <input type="text" id="cpf" name="cpf" maxlength="14" placeholder="000.000.000-00" required>
        </div>

        <div class="campo">
          <label for="tipoAcao">Tipo de ação</label>
          <input type="text" id="tipoAcao" name="tipoAcao" required/>
        </div>

        <div class="campo">
          <label for="statusProcesso">Status</label>
          <select id="statusProcesso" name="statusProcesso" required>
            <option value="pendente">Pendente</option>
            <option value="em_andamento">Em andamento</option>
            <option value="concluido">Concluído</option>
            <option value="arquivado">Arquivado</option>
          </select>
        </div>

        <div class="campo">
          <label for="dataProtocolo">Data de protocolo</label>
          <input type="date" id="dataProtocolo" name="dataProtocolo" required/>
        </div>

        <div class="campo campo-full">
          <label for="descricao">Descrição</label>
          <textarea id="descricao" name="descricao" rows="4"></textarea>
        </div>

        <div class="campo campo-full">
          <label for="fotoCliente">Foto do cliente</label>
          <input type="file" id="fotoCliente" name="fotoCliente" accept=".jpg,.jpeg,.png" />
        </div>
        <div class="campo campo-full">
          <label for="docCliente">Documentos do cliente</label>
          <input type="file" id="docCliente" name="docCliente" accept=".pdf,.docx,.doc,.txt" />
        </div>

        <div class="acoes-form campo-full">
          <button type="submit" id="btnSalvar">Salvar</button>
        </div>
      </form>
    <div class="links-navegacao">
      <a href="../Pages/filtros.html" class="button-Filters">Filtros</a>
      <a href="../Pages/listagens.html" class="button-Listens">Listagens</a>
    </div>
  </main>

  <div id="toastContainer" aria-live="polite" aria-atomic="true"></div>

  <script src="../script.js"></script>
<div id="cookie-banner">
  <p>Usamos cookies para melhorar sua experiência.</p>
  <button id="accept-cookies">Aceitar</button>
  <button id="reject-cookies">Recusar</button>
</div>

<script src="../script.js"></script>
<script src="../script.js"></script>
<div class = "logo-full">
  <img src="../imgs/logotipo1.png" alt="Logo da Empresa">
</div>
</body>
</html>
